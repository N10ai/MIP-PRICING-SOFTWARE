<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MIP Quote Workspace</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
<style>
body{background:#f3f6fb;color:#0f172a}.card{background:#fff;border:1px solid #e2e8f0;box-shadow:0 10px 30px rgba(15,23,42,.05)}.field{width:100%;border:1px solid #cbd5e1;border-radius:.75rem;padding:.7rem .85rem}.label{font-size:.72rem;color:#64748b;text-transform:uppercase;font-weight:700}
</style>
</head>
<body>
<div id="login" class="min-h-screen grid place-items-center p-4"><div class="card rounded-3xl p-7 max-w-md w-full"><h1 class="text-2xl font-semibold">Sign in required</h1><p class="text-slate-500 mt-2 mb-4">Open the Pricing Workspace and sign in first.</p><a href="pricing.html" class="block text-center bg-blue-600 text-white rounded-xl py-3 font-semibold">Go to Pricing Workspace</a></div></div>
<div id="app" class="hidden min-h-screen">
<header class="bg-slate-950 text-white px-5 py-4 flex items-center justify-between"><div><div class="text-xs text-blue-300">MIP Cargo Express</div><b id="headerQuote">Quote Workspace</b></div><div class="flex gap-3"><a href="pricing.html" class="bg-white/10 px-3 py-2 rounded-lg text-sm">Back to requests</a><button id="saveTop" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-semibold">Save</button></div></header>
<main class="max-w-7xl mx-auto p-5"><div id="loading" class="card rounded-2xl p-10 text-center text-slate-500">Loading quote…</div><div id="workspace" class="hidden grid lg:grid-cols-3 gap-5"><section class="lg:col-span-2 space-y-5"><div class="card rounded-2xl p-5"><div class="flex justify-between items-center mb-4"><div><div class="label">Quote</div><h1 id="quoteNumber" class="text-2xl font-semibold"></h1></div><select id="quoteStatus" class="field max-w-xs"><option value="draft">Draft</option><option value="sent">Sent</option><option value="accepted">Accepted</option><option value="rejected">Rejected</option><option value="expired">Expired</option></select></div><div id="infoFields" class="grid md:grid-cols-2 gap-3"></div></div><div class="card rounded-2xl p-5"><div class="flex justify-between mb-3"><h2 class="text-xl font-semibold">Route</h2><button id="addRoute" class="text-blue-600 font-semibold">+ Field</button></div><div id="routeFields" class="grid md:grid-cols-2 gap-3"></div></div><div class="card rounded-2xl p-5"><h2 class="text-xl font-semibold mb-3">Cargo</h2><div id="cargoRows" class="space-y-3"></div></div><div class="card rounded-2xl p-5"><div class="flex justify-between mb-3"><h2 class="text-xl font-semibold">Charges</h2><button id="addCharge" class="text-blue-600 font-semibold">+ Add charge</button></div><div id="chargeRows" class="space-y-3"></div></div><div class="card rounded-2xl p-5"><label class="label">Terms</label><textarea id="terms" class="field mt-1 min-h-36"></textarea></div></section><aside class="space-y-5"><div class="card rounded-2xl p-5 sticky top-5"><h2 class="text-xl font-semibold mb-4">Pricing Summary</h2><div class="space-y-3"><div class="flex justify-between"><span class="text-slate-500">Actual weight</span><b id="actualWeight">0 kg</b></div><div class="flex justify-between"><span class="text-slate-500">Volume</span><b id="volume">0 CBM</b></div><div class="flex justify-between"><span class="text-slate-500">Chargeable weight</span><b id="chargeable">0 kg</b></div><hr><div class="flex justify-between text-lg"><span>Total</span><b id="total">$0.00</b></div><button id="saveBottom" class="w-full bg-blue-600 text-white rounded-xl py-3 font-semibold">Save quote</button><p id="saveMessage" class="text-sm text-center text-slate-500"></p></div></div></aside></div></main>
</div>
<script src="quote-workspace.js"></script>
</body>
</html>
