<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MIP Pricing OS — Vendor RFQ</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script><style>body{background:#f3f6fb;color:#0f172a}.card{background:#fff;border:1px solid #e2e8f0}.field{width:100%;border:1px solid #cbd5e1;border-radius:.75rem;padding:.75rem}</style></head><body><div id="guard" class="min-h-screen grid place-items-center text-slate-500">Loading RFQ workspace...</div><div id="app" class="hidden"><header class="bg-slate-950 text-white px-5 py-4 flex justify-between"><div><div class="text-xs text-blue-300">MIP Cargo Express</div><b>Vendor RFQ</b></div><a href="pricing.html" class="text-sm">Back to requests</a></header><main class="max-w-6xl mx-auto p-5"><div id="summary" class="card rounded-2xl p-5 mb-5"></div><div class="grid lg:grid-cols-2 gap-5"><section class="card rounded-2xl p-5"><div class="flex justify-between items-center mb-3"><div><h2 class="text-xl font-semibold">Select Vendors</h2><p class="text-sm text-slate-500">Choose providers and create one tracked RFQ per vendor.</p></div><a href="vendors.html" class="text-blue-600 text-sm font-semibold">Manage vendors</a></div><input id="vendorSearch" class="field mb-3" placeholder="Search vendors"><div id="vendorList" class="space-y-2"></div><button id="createRfqs" class="w-full bg-violet-600 text-white py-3 rounded-xl font-semibold mt-4">Create RFQs</button><p id="message" class="text-sm mt-3"></p></section><section class="card rounded-2xl p-5"><h2 class="text-xl font-semibold mb-3">RFQ Tracker</h2><div id="rfqList" class="space-y-3"></div></section></div></main><div id="emailModal" class="hidden fixed inset-0 bg-black/40 z-50 p-4"><div class="bg-white max-w-2xl mx-auto mt-8 rounded-3xl p-5"><div class="flex justify-between"><h2 class="text-xl font-semibold">Vendor Rate Request</h2><button id="closeEmail" class="text-2xl">×</button></div><label class="text-xs text-slate-500">To</label><input id="emailTo" class="field mb-3"><label class="text-xs text-slate-500">Subject</label><input id="emailSubject" class="field mb-3"><label class="text-xs text-slate-500">Message</label><textarea id="emailBody" class="field" rows="14"></textarea><div class="flex justify-end gap-3 mt-4"><button id="copyEmail" class="border px-4 py-3 rounded-xl">Copy</button><button id="openEmail" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-semibold">Open email app</button></div></div></div></div><script src="rfq.js"></script></body></html>
