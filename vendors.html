<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MIP Pricing OS — Vendors</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
<style>body{background:#f3f6fb;color:#0f172a}.card{background:#fff;border:1px solid #e2e8f0;box-shadow:0 10px 30px rgba(15,23,42,.05)}.field{width:100%;border:1px solid #cbd5e1;border-radius:.75rem;padding:.75rem}.pill{border-radius:999px;padding:.25rem .6rem;font-size:.75rem;font-weight:600}</style>
</head>
<body>
<div id="guard" class="min-h-screen grid place-items-center text-slate-500">Checking session…</div>
<div id="app" class="hidden min-h-screen">
<header class="bg-slate-950 text-white px-5 py-4 flex justify-between"><div><div class="text-xs text-blue-300">MIP Cargo Express</div><b>Pricing OS</b></div><div class="flex gap-4 items-center"><a href="pricing.html" class="text-sm text-slate-300">Requests</a><a href="vendors.html" class="text-sm font-semibold">Vendors</a><a href="request.html" class="text-sm text-slate-300">Request form</a></div></header>
<main class="max-w-7xl mx-auto p-5">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-5"><div><h1 class="text-3xl font-semibold">Vendor Management</h1><p class="text-sm text-slate-500">GSAs, airlines, ocean carriers, NVOCCs, agents, truckers and service providers.</p></div><button id="newVendor" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-semibold">+ Add vendor</button></div>
<div class="card rounded-2xl overflow-hidden"><div class="p-4 border-b flex gap-3"><input id="search" class="field" placeholder="Search company, type, email or country"><select id="typeFilter" class="field max-w-xs"><option value="">All vendor types</option><option value="airline">Airline</option><option value="gsa">GSA</option><option value="ocean_carrier">Ocean carrier</option><option value="nvocc">NVOCC</option><option value="trucker">Trucker</option><option value="overseas_agent">Overseas agent</option><option value="customs_broker">Customs broker</option><option value="warehouse">Warehouse</option><option value="other">Other</option></select></div><div id="vendorRows" class="divide-y"></div></div>
</main>
<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 p-4"><div class="bg-white max-w-2xl mx-auto mt-8 rounded-3xl max-h-[90vh] overflow-y-auto"><div class="sticky top-0 bg-white border-b p-4 flex justify-between"><h2 id="modalTitle" class="text-xl font-semibold">Vendor</h2><button id="closeModal" class="text-2xl">×</button></div><form id="vendorForm" class="p-5 space-y-4"><input id="vendorId" type="hidden"><div class="grid md:grid-cols-2 gap-3"><div><label class="text-xs text-slate-500">Company</label><input id="company" class="field" required></div><div><label class="text-xs text-slate-500">Vendor type</label><select id="vendorType" class="field"><option value="airline">Airline</option><option value="gsa">GSA</option><option value="ocean_carrier">Ocean carrier</option><option value="nvocc">NVOCC</option><option value="trucker">Trucker</option><option value="overseas_agent">Overseas agent</option><option value="customs_broker">Customs broker</option><option value="warehouse">Warehouse</option><option value="other">Other</option></select></div><div><label class="text-xs text-slate-500">General email</label><input id="generalEmail" class="field" type="email"></div><div><label class="text-xs text-slate-500">Phone</label><input id="phone" class="field"></div><div><label class="text-xs text-slate-500">Website</label><input id="website" class="field"></div><div><label class="text-xs text-slate-500">Payment terms</label><input id="paymentTerms" class="field"></div><div><label class="text-xs text-slate-500">Modes</label><input id="modes" class="field" placeholder="air, ocean, ground"></div><div><label class="text-xs text-slate-500">Countries</label><input id="countries" class="field" placeholder="USA, Ecuador, Colombia"></div></div><label class="flex gap-2 items-center"><input id="preferred" type="checkbox"> Preferred vendor</label><div><label class="text-xs text-slate-500">Notes</label><textarea id="notes" class="field" rows="3"></textarea></div><div class="border-t pt-4"><h3 class="font-semibold mb-3">Primary contact</h3><div class="grid md:grid-cols-2 gap-3"><input id="contactName" class="field" placeholder="Contact name"><input id="contactEmail" class="field" type="email" placeholder="Contact email"><input id="contactPhone" class="field" placeholder="Contact phone"><input id="contactDepartment" class="field" placeholder="Department / pricing desk"></div></div><div class="flex justify-end gap-3"><button type="button" id="cancel" class="px-4 py-3 rounded-xl border">Cancel</button><button class="px-5 py-3 rounded-xl bg-blue-600 text-white font-semibold">Save vendor</button></div><p id="formMessage" class="text-sm"></p></form></div></div>
<script src="vendors.js"></script>
</body></html>
