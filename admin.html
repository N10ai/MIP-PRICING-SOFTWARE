<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MIP Pricing OS — Requests</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
<style>
body{min-height:100vh;background:#f3f6fb;color:#0f172a}.card{background:white;border:1px solid #e2e8f0;box-shadow:0 10px 30px rgba(15,23,42,.05)}.pill{border-radius:999px;padding:.25rem .65rem;font-size:.75rem;font-weight:600}.field{width:100%;border:1px solid #cbd5e1;border-radius:.75rem;padding:.8rem 1rem;outline:none}.field:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
</style>
</head>
<body>
<div id="loginView" class="min-h-screen grid place-items-center p-4">
<form id="loginForm" class="card rounded-3xl p-7 w-full max-w-md">
<p class="text-sm font-semibold text-blue-600">MIP Cargo Express</p><h1 class="text-2xl font-semibold mt-1">Pricing OS</h1><p class="text-sm text-slate-500 mt-2 mb-6">Sign in to view customer requests.</p>
<div class="space-y-3"><input id="loginEmail" class="field" type="email" required placeholder="Email"><input id="loginPassword" class="field" type="password" required placeholder="Password"><button class="w-full bg-blue-600 text-white rounded-xl py-3 font-semibold">Sign in</button><p id="loginMessage" class="text-sm text-red-600"></p></div>
</form>
</div>
<div id="appView" class="hidden min-h-screen">
<header class="bg-slate-950 text-white px-5 py-4 flex items-center justify-between"><div><div class="text-xs text-blue-300">MIP Cargo Express</div><div class="font-semibold">Pricing OS</div></div><div class="flex items-center gap-4"><a href="request.html" class="text-sm text-slate-300 hover:text-white">Public request form</a><button id="logoutBtn" class="text-sm bg-white/10 px-3 py-2 rounded-lg">Sign out</button></div></header>
<main class="max-w-7xl mx-auto p-4 md:p-7">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-5"><div><h1 class="text-3xl font-semibold">Quote Requests</h1><p class="text-sm text-slate-500">Customer intake and pricing queue</p></div><button id="refreshBtn" class="bg-blue-600 text-white px-4 py-2 rounded-xl">Refresh</button></div>
<div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5"></div>
<div class="card rounded-2xl overflow-hidden">
<div class="p-4 border-b flex flex-col md:flex-row gap-3"><input id="search" class="field" placeholder="Search request, customer, route or email"><select id="statusFilter" class="field md:max-w-xs"><option value="">All statuses</option><option value="new">New</option><option value="reviewing">Reviewing</option><option value="missing_information">Missing information</option><option value="vendor_rfq">Vendor RFQ</option><option value="pricing">Pricing</option><option value="ready_to_send">Ready to send</option><option value="sent">Sent</option><option value="follow_up">Follow-up</option><option value="accepted">Accepted</option><option value="rejected">Rejected</option></select></div>
<div id="loading" class="p-8 text-center text-slate-500">Loading requests…</div>
<div id="empty" class="hidden p-10 text-center text-slate-500">No requests found.</div>
<div id="tableWrap" class="hidden overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="text-left px-4 py-3">Request</th><th class="text-left px-4 py-3">Customer</th><th class="text-left px-4 py-3">Shipment</th><th class="text-left px-4 py-3">Status</th><th class="text-left px-4 py-3">Submitted</th><th class="text-right px-4 py-3"></th></tr></thead><tbody id="requestRows"></tbody></table></div>
</div>
</main>
<div id="drawer" class="hidden fixed inset-0 bg-black/35 z-50"><div class="absolute right-0 top-0 h-full w-full max-w-2xl bg-white shadow-2xl overflow-y-auto"><div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center"><div><div class="text-xs text-blue-600">REQUEST DETAILS</div><h2 id="drawerTitle" class="text-xl font-semibold"></h2></div><button id="closeDrawer" class="text-2xl">×</button></div><div id="drawerBody" class="p-5"></div></div></div>
</div>
<script>
const SUPABASE_URL='https://cqsxqjakdnvgcpkqyadj.supabase.co';
const SUPABASE_KEY='sb_publishable_IYA4_sjs0ImzwNHCtBvvTQ_DyjcwQHe';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let requests=[];
const statusLabel=s=>({new:'New',reviewing:'Reviewing',missing_information:'Missing info',vendor_rfq:'Vendor RFQ',pricing:'Pricing',ready_to_send:'Ready to send',sent:'Sent',follow_up:'Follow-up',accepted:'Accepted',rejected:'Rejected',expired:'Expired',converted:'Converted'}[s]||s);
const statusClass=s=>({new:'bg-blue-100 text-blue-700',reviewing:'bg-indigo-100 text-indigo-700',missing_information:'bg-amber-100 text-amber-700',vendor_rfq:'bg-violet-100 text-violet-700',pricing:'bg-cyan-100 text-cyan-700',ready_to_send:'bg-emerald-100 text-emerald-700',sent:'bg-slate-200 text-slate-700',follow_up:'bg-orange-100 text-orange-700',accepted:'bg-green-100 text-green-700',rejected:'bg-red-100 text-red-700'}[s]||'bg-slate-100 text-slate-700');
async function boot(){const {data:{session}}=await db.auth.getSession();toggleViews(Boolean(session));if(session)loadRequests();}
function toggleViews(logged){document.getElementById('loginView').classList.toggle('hidden',logged);document.getElementById('appView').classList.toggle('hidden',!logged);}
document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();const msg=document.getElementById('loginMessage');msg.textContent='';const {error}=await db.auth.signInWithPassword({email:document.getElementById('loginEmail').value,password:document.getElementById('loginPassword').value});if(error){msg.textContent=error.message;return;}toggleViews(true);loadRequests();};
document.getElementById('logoutBtn').onclick=async()=>{await db.auth.signOut();toggleViews(false);};
async function loadRequests(){document.getElementById('loading').classList.remove('hidden');document.getElementById('tableWrap').classList.add('hidden');document.getElementById('empty').classList.add('hidden');const {data,error}=await db.from('quote_requests').select('*').is('archived_at',null).order('submitted_at',{ascending:false}).limit(250);document.getElementById('loading').classList.add('hidden');if(error){document.getElementById('empty').textContent=error.message;document.getElementById('empty').classList.remove('hidden');return;}requests=data||[];renderStats();render();}
function renderStats(){const count=s=>requests.filter(r=>r.status===s).length;const cards=[['New',count('new')],['Waiting vendors',count('vendor_rfq')],['Pricing',count('pricing')],['Ready / sent',count('ready_to_send')+count('sent')]];document.getElementById('stats').innerHTML=cards.map(([l,v])=>`<div class="card rounded-2xl p-4"><div class="text-2xl font-semibold">${v}</div><div class="text-sm text-slate-500">${l}</div></div>`).join('');}
function render(){const q=document.getElementById('search').value.toLowerCase(),s=document.getElementById('statusFilter').value;const list=requests.filter(r=>(!s||r.status===s)&&[r.request_number,r.customer_company,r.contact_email,r.origin_name,r.destination_name,r.mode].join(' ').toLowerCase().includes(q));document.getElementById('empty').classList.toggle('hidden',list.length>0);document.getElementById('tableWrap').classList.toggle('hidden',list.length===0);document.getElementById('requestRows').innerHTML=list.map(r=>`<tr class="border-t hover:bg-slate-50"><td class="px-4 py-4"><div class="font-semibold">${r.request_number}</div><div class="text-xs text-slate-500">${r.priority||'normal'} priority</div></td><td class="px-4 py-4"><div>${r.customer_company||r.contact_name||'Guest request'}</div><div class="text-xs text-slate-500">${r.contact_email}</div></td><td class="px-4 py-4"><div class="font-medium uppercase text-xs">${r.mode||'—'} ${r.service_type||''}</div><div>${r.origin_code||r.origin_name||'—'} → ${r.destination_code||r.destination_name||'—'}</div></td><td class="px-4 py-4"><span class="pill ${statusClass(r.status)}">${statusLabel(r.status)}</span></td><td class="px-4 py-4 text-slate-500">${new Date(r.submitted_at).toLocaleString()}</td><td class="px-4 py-4 text-right"><button onclick="openRequest('${r.id}')" class="text-blue-600 font-semibold">Open</button></td></tr>`).join('');}
async function openRequest(id){const r=requests.find(x=>x.id===id);if(!r)return;document.getElementById('drawerTitle').textContent=r.request_number;document.getElementById('drawer').classList.remove('hidden');document.getElementById('drawerBody').innerHTML='<div class="text-slate-500">Loading details…</div>';const [{data:cargo},{data:stops},{data:activities}]=await Promise.all([db.from('quote_request_cargo').select('*').eq('quote_request_id',id).order('line_number'),db.from('quote_request_stops').select('*').eq('quote_request_id',id),db.from('commercial_activities').select('*').eq('quote_request_id',id).order('created_at',{ascending:false})]);const options=['new','reviewing','missing_information','vendor_rfq','pricing','ready_to_send','sent','follow_up','accepted','rejected'];document.getElementById('drawerBody').innerHTML=`<div class="space-y-5"><section><label class="text-xs text-slate-500">STATUS</label><select id="detailStatus" class="field mt-1">${options.map(x=>`<option value="${x}" ${x===r.status?'selected':''}>${statusLabel(x)}</option>`).join('')}</select></section><section class="grid grid-cols-2 gap-3"><div class="card rounded-xl p-3"><div class="text-xs text-slate-500">Customer</div><div class="font-semibold">${r.customer_company||'—'}</div><div class="text-sm">${r.contact_name||''}</div><div class="text-sm text-slate-500">${r.contact_email}</div></div><div class="card rounded-xl p-3"><div class="text-xs text-slate-500">Route</div><div class="font-semibold">${r.origin_code||r.origin_name||'—'} → ${r.destination_code||r.destination_name||'—'}</div><div class="text-sm uppercase">${r.mode||'—'} ${r.service_type||''}</div></div></section><section><h3 class="font-semibold mb-2">Cargo</h3><div class="space-y-2">${(cargo||[]).map(x=>`<div class="border rounded-xl p-3"><div class="font-medium">${x.quantity} ${x.packaging_type||'piece(s)'} — ${x.commodity||'Cargo'}</div><div class="text-sm text-slate-500">${x.weight_value} ${x.weight_unit} each • ${x.length_value}×${x.width_value}×${x.height_value} ${x.dimension_unit}</div></div>`).join('')||'<div class="text-sm text-slate-500">No cargo lines</div>'}</div></section><section><h3 class="font-semibold mb-2">Stops</h3>${(stops||[]).map(x=>`<div class="border rounded-xl p-3 mb-2"><div class="text-xs uppercase text-blue-600">${x.stop_type}</div><div class="font-medium">${x.company||''}</div><div class="text-sm text-slate-500">${[x.address_line1,x.city,x.state_region,x.postal_code].filter(Boolean).join(', ')}</div></div>`).join('')||'<div class="text-sm text-slate-500">No inland stops</div>'}</section><section class="grid grid-cols-2 gap-3"><button id="vendorBtn" class="bg-violet-600 text-white rounded-xl py-3 font-semibold">Request vendor rates</button><button id="quoteBtn" class="bg-blue-600 text-white rounded-xl py-3 font-semibold">Create quote</button></section><section><h3 class="font-semibold mb-2">Timeline</h3>${(activities||[]).map(a=>`<div class="border-l-2 border-blue-200 pl-3 py-2"><div class="font-medium">${a.title}</div><div class="text-sm text-slate-500">${a.description||''}</div><div class="text-xs text-slate-400">${new Date(a.created_at).toLocaleString()}</div></div>`).join('')||'<div class="text-sm text-slate-500">No activity yet</div>'}</section></div>`;document.getElementById('detailStatus').onchange=async e=>{await db.from('quote_requests').update({status:e.target.value,last_activity_at:new Date().toISOString()}).eq('id',id);r.status=e.target.value;renderStats();render();};document.getElementById('vendorBtn').onclick=()=>alert('Vendor selection workspace is the next sprint.');document.getElementById('quoteBtn').onclick=()=>alert('Request-to-quote prefill is the next connection step.');}
document.getElementById('closeDrawer').onclick=()=>document.getElementById('drawer').classList.add('hidden');document.getElementById('drawer').onclick=e=>{if(e.target.id==='drawer')document.getElementById('drawer').classList.add('hidden');};document.getElementById('refreshBtn').onclick=loadRequests;document.getElementById('search').oninput=render;document.getElementById('statusFilter').onchange=render;boot();
</script>
</body>
</html>
